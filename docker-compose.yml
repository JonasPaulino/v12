version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: v12-db
    restart: always
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PGTZ: ${TZ:-America/Sao_Paulo}
      POSTGRES_USER: ${POSTGRES_USER:-v12}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}
      POSTGRES_DB: ${POSTGRES_DB:-v12_db}
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./back/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./back/migrations/001_base_schema.sql:/docker-entrypoint-initdb.d/001_base_schema.sql:ro
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-v12} -d ${POSTGRES_DB:-v12_db}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - v12-net

  backend:
    build: ./back
    container_name: v12-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-4000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-v12}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD nao definido}
      DB_DATABASE: ${POSTGRES_DB:-v12_db}
      CHAVE_TOKEN: ${CHAVE_TOKEN:?CHAVE_TOKEN nao definido}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      TOKEN_EXPIRES_IN: 8h
    ports:
      - "${API_EXPOSE_PORT:-4000}:4000"
    networks:
      - v12-net

  frontend:
    build: ./front
    container_name: v12-frontend
    restart: always
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONT_EXPOSE_PORT:-3000}:80"
    networks:
      - v12-net

networks:
  v12-net:
    driver: bridge
