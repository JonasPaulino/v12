services:
  db:
    image: postgres:15-alpine
    container_name: v12-db
    restart: always
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PGTZ: ${TZ:-America/Sao_Paulo}
      POSTGRES_USER: ${POSTGRES_USER:-v12}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      POSTGRES_DB: ${POSTGRES_DB:-db_v12}
    volumes:
      - ./db_data:/var/lib/postgresql/data
      - ./back/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./back/migrations/001_base_schema.sql:/docker-entrypoint-initdb.d/001_base_schema.sql:ro
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-v12} -d ${POSTGRES_DB:-db_v12}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - v12-net

  backend:
    build: ./back
    container_name: v12-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-4000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-v12}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      DB_DATABASE: ${POSTGRES_DB:-db_v12}
      CHAVE_TOKEN: ${CHAVE_TOKEN:-troque-esta-chave-longa}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      TOKEN_EXPIRES_IN: 8h
      PAYMENTS_SERVICE_URL: http://payments:4200
      PAYMENTS_SERVICE_TOKEN: ${PAYMENTS_SERVICE_TOKEN:-troque-este-token-interno}
    ports:
      - "${API_EXPOSE_PORT:-4000}:4000"
    networks:
      - v12-net

  payments:
    build: ./payments
    container_name: v12-payments
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PORT: ${PAYMENTS_PORT:-4200}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-v12}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      DB_DATABASE: ${POSTGRES_DB:-db_v12}
      CHAVE_TOKEN: ${CHAVE_TOKEN:-troque-esta-chave-longa}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SERVICE_TOKEN: ${PAYMENTS_SERVICE_TOKEN:-troque-este-token-interno}
      BACKEND_URL: http://backend:4000
      BACKEND_SERVICE_TOKEN: ${PAYMENTS_SERVICE_TOKEN:-troque-este-token-interno}
    ports:
      - "${PAYMENTS_EXPOSE_PORT:-4200}:4200"
    networks:
      - v12-net

  acbr:
    build: ./acbr
    container_name: v12-acbr
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PORT: ${ACBR_PORT:-4100}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-v12}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      DB_DATABASE: ${POSTGRES_DB:-db_v12}
      CHAVE_TOKEN: ${CHAVE_TOKEN:-troque-esta-chave-longa}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      ACBRLIB_ENABLED: ${ACBRLIB_ENABLED:-false}
      ACBRLIB_PATH: ${ACBRLIB_PATH:-}
      ACBRLIB_CONFIG_DIR: ${ACBRLIB_CONFIG_DIR:-./config/acbrlib}
      ACBRLIB_TEMP_DIR: ${ACBRLIB_TEMP_DIR:-./temp}
    ports:
      - "${ACBR_EXPOSE_PORT:-4100}:4100"
    networks:
      - v12-net

  frontend:
    build:
      context: ./front
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_ACBR_API_URL: ${VITE_ACBR_API_URL:-/acbr}
    container_name: v12-frontend
    restart: always
    depends_on:
      backend:
        condition: service_started
      payments:
        condition: service_started
      acbr:
        condition: service_started
    ports:
      - "${FRONT_EXPOSE_PORT:-3000}:80"
    networks:
      - v12-net
      - proxy-net

networks:
  v12-net:
    driver: bridge
  proxy-net:
    external: true
    name: ${NPM_EXTERNAL_NETWORK:-nginx-proxy-manager_default}
