appId: br.com.jhes.v12pdv
productName: V12 PDV
asar: true
directories:
  output: dist/releases
asarUnpack:
  - apps/server/**
  - packages/**
  - node_modules/**
  - node_modules/better-sqlite3/**
  - node_modules/@projetoacbr/**
files:
  - apps/station/dist/**
  - apps/station/electron/**
  - apps/station/package.json
  - apps/server/**
  - tools/**
  - Restaurar V12 PDV.cmd
  - package.json
  - package-lock.json
extraResources:
  - from: .env
    to: .env
  - from: lib
    to: lib
    filter:
      - "**/*"
  - from: tools
    to: tools
    filter:
      - "**/*"
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: apps/station/src/assets/favicon.png
nsis:
  oneClick: false
  perMachine: false
  include: build/installer.nsh
  allowToChangeInstallationDirectory: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: V12 PDV
