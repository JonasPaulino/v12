services:
  db:
    image: postgres:15-alpine
    container_name: v12-db
    restart: always
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PGTZ: ${TZ:-America/Sao_Paulo}
      POSTGRES_USER: ${POSTGRES_USER:-v12}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      POSTGRES_DB: ${POSTGRES_DB:-db_v12}
    volumes:
      - ../db_data:/var/lib/postgresql/data
      - ./back/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./back/migrations/001_base_schema.sql:/docker-entrypoint-initdb.d/001_base_schema.sql:ro
    ports:
      - "${POSTGRES_EXPOSE_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-v12} -d ${POSTGRES_DB:-db_v12}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - v12-net

  backend:
    build: ./back
    container_name: v12-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${API_PORT:-4000}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-v12}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      DB_DATABASE: ${POSTGRES_DB:-db_v12}
      CHAVE_TOKEN: ${CHAVE_TOKEN:-troque-esta-chave-longa}
      AUTH_DEBUG: ${AUTH_DEBUG:-false}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      COOKIE_SAME_SITE: ${COOKIE_SAME_SITE:-lax}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      TOKEN_EXPIRES_IN: 8h
      PAYMENTS_SERVICE_URL: http://payments:4200
      PAYMENTS_SERVICE_TOKEN: ${PAYMENTS_SERVICE_TOKEN:-troque-este-token-interno}
      MESSAGE_SERVICE_URL: http://message:${MESSAGE_PORT:-4300}
      MESSAGE_SERVICE_TOKEN: ${MESSAGE_SERVICE_TOKEN:-troque-este-token-message}
      ACBR_SERVICE_URL: http://acbr:4100
      DESKTOP_SYNC_TOKEN: ${DESKTOP_SYNC_TOKEN:-troque-este-token-desktop}
    ports:
      - "${API_EXPOSE_PORT:-4000}:4000"
    networks:
      - v12-net

  payments:
    build: ./payments
    container_name: v12-payments
    restart: always
    depends_on:
      db:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PORT: ${PAYMENTS_PORT:-4200}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-v12}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      DB_DATABASE: ${POSTGRES_DB:-db_v12}
      CHAVE_TOKEN: ${CHAVE_TOKEN:-troque-esta-chave-longa}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SERVICE_TOKEN: ${PAYMENTS_SERVICE_TOKEN:-troque-este-token-interno}
      BACKEND_URL: http://backend:4000
      BACKEND_SERVICE_TOKEN: ${PAYMENTS_SERVICE_TOKEN:-troque-este-token-interno}
    ports:
      - "${PAYMENTS_EXPOSE_PORT:-4200}:4200"
    networks:
      - v12-net

  redis:
    image: redis:7-alpine
    container_name: v12-message-redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - v12-net

  evolution-api:
    image: evoapicloud/evolution-api:v2.3.7
    container_name: v12-evolution-api
    restart: unless-stopped
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      AUTHENTICATION_API_KEY: ${EVOLUTION_AUTH_KEY:-troque-esta-chave-evolution}
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      LANGUAGE: "pt"
      SERVER_TYPE: "http"
      SERVER_PORT: "8080"
      SERVER_URL: ${EVOLUTION_SERVER_URL:-http://evolution-api:8080}
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: "postgresql"
      DATABASE_CONNECTION_URI: "postgresql://${POSTGRES_USER:-v12}:${POSTGRES_PASSWORD:-v12_password}@db:5432/${POSTGRES_DB:-db_v12}?schema=evolution_api"
      DATABASE_CONNECTION_CLIENT_NAME: "evolution_v12"
      DATABASE_SAVE_DATA_INSTANCE: "true"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
      DATABASE_SAVE_DATA_CONTACTS: "true"
      DATABASE_SAVE_DATA_CHATS: "true"
      DATABASE_SAVE_DATA_LABELS: "true"
      DATABASE_SAVE_DATA_HISTORIC: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP: "true"
      DATABASE_SAVE_IS_ON_WHATSAPP_DAYS: "7"
      DATABASE_DELETE_MESSAGE: "true"
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_URI: "redis://redis:6379/6"
      CACHE_REDIS_TTL: "604800"
      CACHE_REDIS_PREFIX_KEY: "evolution"
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "false"
      CORS_ORIGIN: "*"
      CORS_METHODS: "GET,POST,PUT,DELETE"
      CORS_CREDENTIALS: "true"
      LOG_LEVEL: "ERROR,WARN,DEBUG,INFO,LOG,VERBOSE"
      LOG_COLOR: "true"
      LOG_BAILEYS: "info"
      CONFIG_SESSION_PHONE_CLIENT: "Evolution API"
      CONFIG_SESSION_PHONE_NAME: "Chrome"
      CONFIG_SESSION_PHONE_VERSION: ${EVOLUTION_CONFIG_SESSION_PHONE_VERSION:-2.3000.1042201107-alpha}
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#175197"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:8080', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s
    volumes:
      - evolution_store:/evolution/store
      - evolution_instances:/evolution/instances
    networks:
      - v12-net

  message:
    build: ./message
    container_name: v12-message
    restart: always
    depends_on:
      evolution-api:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PORT: ${MESSAGE_PORT:-4300}
      EVOLUTION_API_BASE_URL: http://evolution-api:8080
      EVOLUTION_API_KEY: ${EVOLUTION_AUTH_KEY:-troque-esta-chave-evolution}
      EVOLUTION_DEFAULT_INSTANCE: ${MESSAGE_EVOLUTION_DEFAULT_INSTANCE:-v12-main}
      SERVICE_TOKEN: ${MESSAGE_SERVICE_TOKEN:-troque-este-token-message}
    ports:
      - "${MESSAGE_EXPOSE_PORT:-4300}:4300"
    networks:
      - v12-net

  acbr:
    build: ./acbr
    container_name: v12-acbr
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PORT: ${ACBR_PORT:-4100}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-v12}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      DB_DATABASE: ${POSTGRES_DB:-db_v12}
      CHAVE_TOKEN: ${CHAVE_TOKEN:-troque-esta-chave-longa}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      ACBRLIB_ENABLED: ${ACBRLIB_ENABLED:-false}
      ACBR_DEBUG_CONFIG: ${ACBR_DEBUG_CONFIG:-false}
      ACBRLIB_PATH: ${ACBRLIB_PATH:-./lib/ACBrLibNFE/linux/CONSOLE-MT/libacbrnfe64.so}
      ACBRLIB_CONFIG_DIR: ${ACBRLIB_CONFIG_DIR:-./config/acbrlib}
      ACBRLIB_TEMP_DIR: ${ACBRLIB_TEMP_DIR:-./temp}
      ACBRLIB_SCHEMA_PATH: ${ACBRLIB_SCHEMA_PATH:-./lib/ACBrLibNFE/dep/Schemas/NFe}
      ACBR_DFE_SSL_CRYPT_LIB: ${ACBR_DFE_SSL_CRYPT_LIB:-1}
      ACBR_DFE_SSL_HTTP_LIB: ${ACBR_DFE_SSL_HTTP_LIB:-3}
      ACBR_DFE_SSL_XML_SIGN_LIB: ${ACBR_DFE_SSL_XML_SIGN_LIB:-4}
      ACBR_NFE_SSL_TYPE: ${ACBR_NFE_SSL_TYPE:-5}
    ports:
      - "${ACBR_EXPOSE_PORT:-4100}:4100"
    networks:
      - v12-net

  reports:
    build: ./reports
    container_name: v12-reports
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/Sao_Paulo}
      PORT: ${REPORTS_PORT:-4400}
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-v12}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-v12_password}
      DB_DATABASE: ${POSTGRES_DB:-db_v12}
      CHAVE_TOKEN: ${CHAVE_TOKEN:-troque-esta-chave-longa}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
    ports:
      - "${REPORTS_EXPOSE_PORT:-4400}:4400"
    networks:
      - v12-net

  frontend:
    build:
      context: ./front
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_ACBR_API_URL: ${VITE_ACBR_API_URL:-/acbr}
    container_name: v12-frontend
    restart: always
    depends_on:
      backend:
        condition: service_started
      payments:
        condition: service_started
      message:
        condition: service_started
      acbr:
        condition: service_started
      reports:
        condition: service_started
    ports:
      - "${FRONT_EXPOSE_PORT:-3000}:80"
    networks:
      - v12-net
      - proxy-net

networks:
  v12-net:
    driver: bridge
  proxy-net:
    external: true
    name: ${NPM_EXTERNAL_NETWORK:-nginx-proxy-manager_default}

volumes:
  evolution_store:
  evolution_instances:
  redis_data:
